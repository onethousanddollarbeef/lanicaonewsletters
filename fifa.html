    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function renderArticle(language) {
        const dictionary = translations[language] || translations.en;
        const contentEl = document.getElementById("editorial-content");
        contentEl.innerHTML = dictionary.paragraphs.map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`).join("");
    }

    function applyLanguage(language) {
        const dictionary = translations[language] || translations.en;

        document.documentElement.lang =
            language === "zhHans" ? "zh-Hans" : language === "zhHant" ? "zh-Hant" : "en";

        document.title = dictionary.pageTitle || translations.en.pageTitle;

        document.querySelectorAll("[data-i18n]").forEach((element) => {
            const key = element.getAttribute("data-i18n");
            if (dictionary[key]) element.textContent = dictionary[key];
        });

        document.querySelectorAll("[data-i18n-aria-label]").forEach((element) => {
            const key = element.getAttribute("data-i18n-aria-label");
            if (dictionary[key]) element.setAttribute("aria-label", dictionary[key]);
        });

        document.querySelectorAll("[data-i18n-meta-description]").forEach((element) => {
            const key = element.getAttribute("data-i18n-meta-description");
            if (dictionary[key]) element.setAttribute("content", dictionary[key]);
        });

        document.querySelectorAll(".language-button").forEach((button) => {
            button.classList.toggle("active", button.dataset.language === language);
        });

        renderArticle(language);

        try {
            localStorage.setItem("newsletterLanguage", language);
            localStorage.setItem("language", language);
        } catch (error) {}
    }

    document.addEventListener("DOMContentLoaded", () => {
        let savedLanguage = "en";
        try {
            savedLanguage = localStorage.getItem("newsletterLanguage") || localStorage.getItem("language") || "en";
        } catch (error) {}

        document.querySelectorAll(".language-button[data-language]").forEach((button) => {
            button.addEventListener("click", () => applyLanguage(button.dataset.language));
        });

        applyLanguage(translations[savedLanguage] ? savedLanguage : "en");
    });
